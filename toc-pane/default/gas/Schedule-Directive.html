<h4 class="subsubsection subsection-level-set-subsubsection" id="schedule"><span>9.55.5.1 schedule<a class="copiable-link" href="#schedule"> &para;</a></span></h4>
<a class="index-entry-id" id="index-schedule-directive"></a>
<a class="index-entry-id" id="index-no_002dschedule-directive"></a>

<p>The <code class="code">schedule</code> directive is recognized only for compatibility with
Tensilica&rsquo;s assembler.
</p>
<div class="example smallexample">
<div class="group"><pre class="example-preformatted">    .begin [no-]schedule
    .end [no-]schedule
</pre></div></div>

<p>This directive is ignored and has no effect on <code class="command">as</code>.
</p>
