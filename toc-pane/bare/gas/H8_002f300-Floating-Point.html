<h4 class="subsection section-level-set-subsection" id="Floating-Point-5"><span>9.14.3 Floating Point<a class="copiable-link" href="#Floating-Point-5"> &para;</a></span></h4>

<a class="index-entry-id" id="index-floating-point_002c-H8_002f300-_0028ieee_0029"></a>
<a class="index-entry-id" id="index-H8_002f300-floating-point-_0028ieee_0029"></a>
<p>The H8/300 family has no hardware floating point, but the <code class="code">.float</code>
directive generates <small class="sc">IEEE</small> floating-point numbers for compatibility
with other development tools.
