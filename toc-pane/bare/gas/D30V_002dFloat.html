<h4 class="subsection section-level-set-subsection" id="Floating-Point-4"><span>9.12.3 Floating Point<a class="copiable-link" href="#Floating-Point-4"> &para;</a></span></h4>
<a class="index-entry-id" id="index-floating-point_002c-D30V"></a>
<a class="index-entry-id" id="index-D30V-floating-point"></a>
<p>The D30V has no hardware floating point, but the <code class="code">.float</code> and <code class="code">.double</code>
directives generates <small class="sc">IEEE</small> floating-point numbers for compatibility
with other development tools.
