<h4 class="subsubsection subsection-level-set-subsubsection" id="Special-Characters-17"><span>9.26.2.1 Special Characters<a class="copiable-link" href="#Special-Characters-17"> &para;</a></span></h4>

<a class="index-entry-id" id="index-line-comment-character_002c-Meta"></a>
<a class="index-entry-id" id="index-Meta-line-comment-character"></a>
<p>&lsquo;<samp class="samp">!</samp>&rsquo; is the line comment character.
</p>
<a class="index-entry-id" id="index-line-separator_002c-Meta"></a>
<a class="index-entry-id" id="index-statement-separator_002c-Meta"></a>
<a class="index-entry-id" id="index-Meta-line-separator"></a>
<p>You can use &lsquo;<samp class="samp">;</samp>&rsquo; instead of a newline to separate statements.
</p>
<a class="index-entry-id" id="index-symbol-names_002c-_0024-in-2"></a>
<a class="index-entry-id" id="index-_0024-in-symbol-names-2"></a>
<p>Since &lsquo;<samp class="samp">$</samp>&rsquo; has no special meaning, you may use it in symbol names.
</p>
