<h4 class="subsection" id="Prefix-Operator"><span>6.2.3 Prefix Operator<a class="copiable-link" href="#Prefix-Operator"> &para;</a></span></h4>

<a class="index-entry-id" id="index-prefix-operators"></a>
<p><code class="command">as</code> has the following <em class="dfn">prefix operators</em>.  They each take
one argument, which must be absolute.
</p>

<dl class="table">
<dt><code class="code">-</code></dt>
<dd><p><em class="dfn">Negation</em>.  Two&rsquo;s complement negation.
</p></dd>
<dt><code class="code">~</code></dt>
<dd><p><em class="dfn">Complementation</em>.  Bitwise not.
</p></dd>
</dl>
