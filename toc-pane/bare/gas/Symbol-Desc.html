<h4 class="subsubsection" id="Descriptor"><span>5.5.3.1 Descriptor<a class="copiable-link" href="#Descriptor"> &para;</a></span></h4>

<a class="index-entry-id" id="index-descriptor_002c-of-a_002eout-symbol"></a>
<p>This is an arbitrary 16-bit value.  You may establish a symbol&rsquo;s
descriptor value by using a <code class="code">.desc</code> statement
(see <a class="pxref" href="Desc.html"><code class="code">.desc</code></a>).  A descriptor value means nothing to
<code class="command">as</code>.
